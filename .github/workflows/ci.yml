name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write

env:
  BUILD_TYPE: Release
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  # Job 1: Code Formatting Check (fast, runs in parallel with security-scan and build)
  format-check:
    name: Code Formatting
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install LLVM
      run: |
        if (Get-Command clang-format -ErrorAction SilentlyContinue) {
          Write-Host "✅ LLVM already available"
        } else {
          Write-Host "Installing LLVM..."
          choco install llvm --no-progress
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH
        }
        clang-format --version
        
    - name: Check code formatting
      run: |
        $files = Get-ChildItem -Path backend,frontend,src,Tests -Include *.cpp,*.h,*.hpp -Recurse -File
        $unformatted = @()
        
        foreach ($file in $files) {
          $result = clang-format --dry-run --Werror $file.FullName 2>&1
          if ($LASTEXITCODE -ne 0) {
            $unformatted += $file.FullName
            Write-Host "❌ $file needs formatting" -ForegroundColor Red
          }
        }
        
        if ($unformatted.Count -gt 0) {
          Write-Host "`nThe following files need formatting:" -ForegroundColor Red
          $unformatted | ForEach-Object { Write-Host "  $_" }
          exit 1
        }
        
        Write-Host "✅ All files are properly formatted!" -ForegroundColor Green

  # Job 2: Security Scan (runs in parallel with format-check and build)
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.24.0
      continue-on-error: true
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Job 3: Build (runs in parallel with format-check and security-scan)
  build:
    name: Build (Windows)
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '4bb07a326d9b9bce3703272a509e5bc25dd9cfd5'
        
    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          ${{github.workspace}}/vcpkg_installed
          ${{github.workspace}}/vcpkg
        key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-
          
    - name: Configure CMake
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        cmake -B ${{github.workspace}}/build `
          -S ${{github.workspace}} `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE=${{github.workspace}}/vcpkg/scripts/buildsystems/vcpkg.cmake `
          -DVCPKG_TARGET_TRIPLET=x64-windows `
          -DVCPKG_INSTALLED_DIR=${{github.workspace}}/vcpkg_installed `
          -DBUILD_TESTS=ON `
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        if ($LASTEXITCODE -ne 0) {
          Write-Host "❌ CMake configuration failed!" -ForegroundColor Red
          exit 1
        }
        Write-Host "✅ CMake configuration successful" -ForegroundColor Green
          
    - name: Build
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        Write-Host "Starting build..." -ForegroundColor Cyan
        cmake --build ${{github.workspace}}/build --config Release --parallel 2>&1 | Tee-Object -FilePath ${{github.workspace}}/build.log
        $buildExitCode = $LASTEXITCODE
        if ($buildExitCode -ne 0) {
          Write-Host "`n❌ BUILD FAILED with exit code $buildExitCode" -ForegroundColor Red
          Write-Host "`n=== SEARCHING FOR ERRORS (not warnings) ===" -ForegroundColor Yellow
          # Filter for actual errors, not warnings
          $errors = Get-Content ${{github.workspace}}/build.log | Where-Object { 
            $_ -match "error [A-Z]*\d*:" -or 
            $_ -match "fatal error" -or 
            $_ -match "cannot find" -or 
            $_ -match "undefined reference" -or
            $_ -match "unresolved external" -or
            $_ -match "LINK.*error" -or
            $_ -match "Build FAILED"
          }
          if ($errors) {
            Write-Host "`n=== ERRORS FOUND ===" -ForegroundColor Red
            $errors | Select-Object -Last 30 | ForEach-Object { Write-Host $_ }
          } else {
            Write-Host "`n=== Build Log (last 100 lines) ===" -ForegroundColor Yellow
            Get-Content ${{github.workspace}}/build.log -Tail 100
          }
          exit $buildExitCode
        }
        Write-Host "`n✅ Build completed successfully" -ForegroundColor Green
        
        # Build test executables explicitly
        Write-Host "`nBuilding test executables..." -ForegroundColor Cyan
        cmake --build ${{github.workspace}}/build --config Release --target test_session_consolidated test_repository_consolidated test_signing_robustness test_segwit test_rbf_cpfp test_ethereum_robustness --parallel 2>&1 | Tee-Object -FilePath ${{github.workspace}}/test_build.log
        $testBuildExitCode = $LASTEXITCODE
        if ($testBuildExitCode -ne 0) {
          Write-Host "`n❌ TEST BUILD FAILED with exit code $testBuildExitCode" -ForegroundColor Red
          Write-Host "`n=== SEARCHING FOR ERRORS ===" -ForegroundColor Yellow
          $errors = Get-Content ${{github.workspace}}/test_build.log | Where-Object { 
            $_ -match "error [A-Z]*\d*:" -or 
            $_ -match "fatal error" -or 
            $_ -match "cannot find" -or 
            $_ -match "undefined reference" -or
            $_ -match "unresolved external"
          }
          if ($errors) {
            Write-Host "`n=== ERRORS FOUND ===" -ForegroundColor Red
            $errors | Select-Object -Last 20 | ForEach-Object { Write-Host $_ }
          } else {
            Get-Content ${{github.workspace}}/test_build.log -Tail 50
          }
          exit $testBuildExitCode
        }
        Write-Host "`n✅ Test executables built successfully" -ForegroundColor Green

    - name: List build outputs
      run: |
        Write-Host "Build directory contents:" -ForegroundColor Cyan
        $buildPath = Join-Path $env:GITHUB_WORKSPACE "build"
        $releasePath = Join-Path $buildPath "Release"
        if (Test-Path $releasePath) {
          Get-ChildItem -Path $releasePath -Recurse | ForEach-Object { Write-Host $_.FullName }
        } else {
          Write-Host "Release directory not found at: $releasePath" -ForegroundColor Red
          Get-ChildItem -Path $buildPath -Recurse | ForEach-Object { Write-Host $_.FullName }
        }
        Write-Host "`nCompile commands:" -ForegroundColor Cyan
        $compileCommandsPath = Join-Path $buildPath "compile_commands.json"
        if (Test-Path $compileCommandsPath) {
          Write-Host "✅ compile_commands.json exists"
        } else {
          Write-Host "❌ compile_commands.json not found at: $compileCommandsPath"
        }

    - name: Verify files exist before upload
      run: |
        # Check both possible locations
        $buildPath = Join-Path $env:GITHUB_WORKSPACE "build"
        $exeFilesRelease = Get-ChildItem -Path (Join-Path $buildPath "Release/*.exe") -ErrorAction SilentlyContinue
        $dllFilesRelease = Get-ChildItem -Path (Join-Path $buildPath "Release/*.dll") -ErrorAction SilentlyContinue
        $exeFilesBin = Get-ChildItem -Path (Join-Path $buildPath "bin/Release/*.exe") -ErrorAction SilentlyContinue
        $dllFilesBin = Get-ChildItem -Path (Join-Path $buildPath "bin/Release/*.dll") -ErrorAction SilentlyContinue
        $jsonFile = Test-Path (Join-Path $buildPath "compile_commands.json")
        
        Write-Host "Files found:" -ForegroundColor Cyan
        Write-Host "  build/Release/*.exe: $($exeFilesRelease.Count)"
        Write-Host "  build/Release/*.dll: $($dllFilesRelease.Count)"
        Write-Host "  build/bin/Release/*.exe: $($exeFilesBin.Count)"
        Write-Host "  build/bin/Release/*.dll: $($dllFilesBin.Count)"
        Write-Host "  compile_commands.json: $jsonFile"
        
        # Warn but don't fail if no exe/dll files found - they might be in bin/
        if (($exeFilesRelease.Count -eq 0 -and $exeFilesBin.Count -eq 0) -and 
            ($dllFilesRelease.Count -eq 0 -and $dllFilesBin.Count -eq 0) -and 
            -not $jsonFile) {
          Write-Host "❌ WARNING: No files found to upload!" -ForegroundColor Red
          exit 1
        }

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: criptogualet-build
        path: |
          ${{github.workspace}}/build/Release/*.exe
          ${{github.workspace}}/build/Release/*.dll
          ${{github.workspace}}/build/bin/Release/*.exe
          ${{github.workspace}}/build/bin/Release/*.dll
          ${{github.workspace}}/build/compile_commands.json
        retention-days: 7
        if-no-files-found: warn

  # Job 4: Run Tests (uses CTest)
  test:
    name: Run Tests
    runs-on: windows-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: criptogualet-build
        path: ${{github.workspace}}/build/bin/Release
        
    - name: List downloaded artifacts
      run: |
        Write-Host "Downloaded artifacts location:" -ForegroundColor Cyan
        Write-Host "Current directory: $(Get-Location)"
        Write-Host "GITHUB_WORKSPACE: $env:GITHUB_WORKSPACE"
        Write-Host "`nBuild directory structure:" -ForegroundColor Cyan
        $buildPath = Join-Path $env:GITHUB_WORKSPACE "build"
        if (Test-Path $buildPath) {
          Get-ChildItem -Path $buildPath -Recurse | ForEach-Object { 
            $relativePath = $_.FullName.Replace($env:GITHUB_WORKSPACE, '.')
            Write-Host $relativePath
          }
        } else {
          Write-Host "Build directory not found at: $buildPath" -ForegroundColor Red
          Write-Host "`nCurrent directory contents:" -ForegroundColor Yellow
          Get-ChildItem -Path . -Recurse | Where-Object { $_.FullName -notmatch '.git' } | ForEach-Object { Write-Host $_.FullName }
        }
        
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '4bb07a326d9b9bce3703272a509e5bc25dd9cfd5'
        
    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          ${{github.workspace}}/vcpkg_installed
          ${{github.workspace}}/vcpkg
        key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-
          
    - name: Configure CMake (for CTest)
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $workspace = $env:GITHUB_WORKSPACE
        cmake -B "$workspace/build" `
          -S "$workspace" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="$workspace/vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows `
          -DVCPKG_INSTALLED_DIR="$workspace/vcpkg_installed" `
          -DBUILD_TESTS=ON
        if ($LASTEXITCODE -ne 0) {
          Write-Host "❌ CMake configuration failed!" -ForegroundColor Red
          exit 1
        }
       
    - name: Build Tests
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $workspace = $env:GITHUB_WORKSPACE
        Write-Host "Building test executables..." -ForegroundColor Cyan
        cmake --build "$workspace/build" --config Release --target test_session_consolidated test_repository_consolidated test_signing_robustness test_segwit test_rbf_cpfp test_ethereum_robustness --parallel 2>&1
        if ($LASTEXITCODE -ne 0) {
          Write-Host "❌ Test build failed!" -ForegroundColor Red
          exit 1
        }
        Write-Host "✅ Test executables built successfully" -ForegroundColor Green
        
    - name: Run Tests with CTest
      working-directory: ${{github.workspace}}/build
      run: |
        Write-Host "Looking for test executables..." -ForegroundColor Cyan
        $testPaths = @("bin/Release", "Release", "Tests/Release", "bin/Debug", "Debug", "Tests/Debug")
        foreach ($path in $testPaths) {
          if (Test-Path $path) {
            $tests = Get-ChildItem -Path $path -Filter "test_*.exe" -ErrorAction SilentlyContinue
            if ($tests) {
              Write-Host "Found $($tests.Count) test(s) in $path" -ForegroundColor Green
              $tests | ForEach-Object { Write-Host "  - $($_.Name)" }
            }
          }
        }
        
        Write-Host "`nTest discovery with CTest..." -ForegroundColor Cyan
        ctest -N
        Write-Host "`nRunning tests..." -ForegroundColor Cyan
        ctest --output-on-failure -C Release

  # Job 5: Static Analysis (separate job using compile_commands.json)
  static-analysis:
    name: Static Analysis
    runs-on: windows-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: criptogualet-build
        path: ${{github.workspace}}/build
        
    - name: List downloaded artifacts
      run: |
        Write-Host "Downloaded artifacts location:" -ForegroundColor Cyan
        Write-Host "Current directory: $(Get-Location)"
        Write-Host "GITHUB_WORKSPACE: $env:GITHUB_WORKSPACE"
        Write-Host "`nBuild directory structure:" -ForegroundColor Cyan
        $buildPath = Join-Path $env:GITHUB_WORKSPACE "build"
        if (Test-Path $buildPath) {
          Get-ChildItem -Path $buildPath -Recurse | ForEach-Object { 
            $relativePath = $_.FullName.Replace($env:GITHUB_WORKSPACE, '.')
            Write-Host $relativePath
          }
        } else {
          Write-Host "Build directory not found at: $buildPath" -ForegroundColor Red
        }
        
        # Check if compile_commands.json exists in the build directory
        $compileCommandsPath = Join-Path $buildPath "compile_commands.json"
        if (Test-Path $compileCommandsPath) {
          Write-Host "✅ compile_commands.json found in build directory" -ForegroundColor Green
        } else {
          Write-Host "❌ compile_commands.json not found at: $compileCommandsPath" -ForegroundColor Red
        }

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '4bb07a326d9b9bce3703272a509e5bc25dd9cfd5'
        
    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          ${{github.workspace}}/vcpkg_installed
          ${{github.workspace}}/vcpkg
        key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-
        
    - name: Install LLVM
      run: |
        if (Get-Command clang-tidy -ErrorAction SilentlyContinue) {
          Write-Host "✅ clang-tidy already available"
        } else {
          Write-Host "Installing LLVM..."
          choco install llvm --no-progress
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH
        }
        clang-tidy --version
        
    - name: Run Static Analysis
      run: |
        Write-Host "`n🔍 Running static analysis with clang-tidy..." -ForegroundColor Cyan
        
        $workspace = $env:GITHUB_WORKSPACE
        
        # Only analyze backend code (Qt frontend has complex dependencies)
        $files = Get-ChildItem -Path backend,src -Include *.cpp -Recurse -File | 
                Where-Object { 
                    $_.FullName -notmatch 'Tests' -and 
                    $_.FullName -notmatch 'build' -and 
                    $_.FullName -notmatch 'frontend' 
                } | Where-Object {
                    $content = Get-Content $_.FullName -Raw -ErrorAction SilentlyContinue
                    $content -notmatch '#include.*Qt'
                }
        
        $includes = @(
          "-I$workspace",
          "-I$workspace/backend",
          "-I$workspace/backend/blockchain/include",
          "-I$workspace/backend/core/include",
          "-I$workspace/backend/database/include",
          "-I$workspace/backend/repository/include",
          "-I$workspace/backend/utils/include",
          "-I$workspace/src",
          "-I$workspace/vcpkg_installed/x64-windows/include"
        )
        
        $hasErrors = $false
        $errorCount = 0
        $totalFiles = 0
        
        foreach ($file in $files) {
          $totalFiles++
          Write-Host "Analyzing [$totalFiles]: $file" -ForegroundColor Gray
          
          $output = clang-tidy $file.FullName -p $workspace/build --config-file $workspace/.clang-tidy --quiet -- -std=c++20 $includes 2>&1 | 
                    Where-Object { $_ -notmatch 'vcpkg_installed' -and $_ -notmatch 'include[/\\]cpr' }
          
          $fileErrors = ($output | Select-String -Pattern "error:").Count
          $errorCount += $fileErrors
          if ($fileErrors -gt 0) {
            $hasErrors = $true
            Write-Host "❌ Found $fileErrors error(s) in $file" -ForegroundColor Red
            $output | Select-String -Pattern "error:" | ForEach-Object { Write-Host $_ -ForegroundColor Red }
          }
        }
        
        Write-Host "`n========================================" -ForegroundColor Yellow
        Write-Host "Files analyzed: $totalFiles" -ForegroundColor Cyan
        if ($hasErrors) {
          Write-Host "❌ Static analysis found $errorCount error(s)" -ForegroundColor Red
          exit 1
        } else {
          Write-Host "✅ Static analysis passed!" -ForegroundColor Green
        }
        Write-Host "========================================" -ForegroundColor Yellow
